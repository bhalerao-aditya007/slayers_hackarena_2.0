<svg width="1200" height="160" viewBox="0 0 1200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="confGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3DDC84"/>
      <stop offset="48%" stop-color="#3DDC84"/>
      <stop offset="52%" stop-color="#E5484D"/>
      <stop offset="75%" stop-color="#E5484D"/>
      <stop offset="100%" stop-color="#3DDC84"/>
    </linearGradient>
    <filter id="g2">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="160" fill="#0B1120"/>

  <text x="40" y="36" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#94A3B8" letter-spacing="1">MODEL CONFIDENCE OVER TIME</text>

  <!-- baseline -->
  <line x1="40" y1="120" x2="1160" y2="120" stroke="#1C2942" stroke-width="1"/>

  <!-- static base line, always visible even without animation support -->
  <path d="M40,70 C140,65 240,72 340,68 C420,66 480,90 540,110 C580,122 620,128 660,128 C720,128 760,100 820,80 C900,55 1000,50 1160,48"
        fill="none" stroke="url(#confGrad)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- confidence line: healthy -> drops -> gate triggers -> recovers (animated draw-on, layers over static base) -->
  <path id="confLine"
        d="M40,70 C140,65 240,72 340,68 C420,66 480,90 540,110 C580,122 620,128 660,128 C720,128 760,100 820,80 C900,55 1000,50 1160,48"
        fill="none" stroke="url(#confGrad)" stroke-width="3" stroke-linecap="round" filter="url(#g2)"
        stroke-dasharray="1400" stroke-dashoffset="1400">
    <animate attributeName="stroke-dashoffset" values="1400;0" dur="3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </path>

  <!-- gate trigger zone shading -->
  <rect x="540" y="20" width="160" height="100" fill="#E5484D" opacity="0.06">
    <animate attributeName="opacity" values="0.06;0.1;0.06" begin="1.6s" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- gate trigger marker + label -->
  <line x1="660" y1="20" x2="660" y2="128" stroke="#E5484D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="660" y="14" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="11" fill="#E5484D" font-weight="600">
    TRADING PAUSED
  </text>

  <!-- recovery marker -->
  <circle cx="1000" cy="50" r="4" fill="#3DDC84"/>
  <text x="1000" y="36" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="11" fill="#3DDC84" font-weight="600">
    RESUMED
  </text>

  <text x="40" y="148" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#94A3B8" font-style="italic">when its own predictions stop tracking reality, TradeEasy stops trading — automatically</text>
</svg>
